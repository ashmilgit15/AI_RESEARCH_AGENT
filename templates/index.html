<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class = "bg-gray-950 min-h-screen flex flex-col items-center justify-center">
    <div class = "w-full max-w-2xl flex flex-col items-center gap-4">
        <h1 class = "text-4xl font-bold text-white mb-4">Trau Research Agent</h1>
         <p class = "text-gray-400 text-center mb-6">Enter a Topic and get a detailed Research</p>
        <input type="text" id = "topic" placeholder="Enter the topic you want to Research.." class="w-full px-4 py-5 rounded-lg bg-gray-800 text-white placeholder-gray-400 border border-gray-700 focus:border-blue-500 outline-none">
        <button class="w-full bg-blue-500 py-3 hover:bg-blue-700 text-white font-semibold rounded-lg cursor-pointer"  onclick="generateReport()">generate Report</button>
         <p class="text-gray-400 text-sm mt-2" id = "status"></p>
    </div>



    <script>
        async function generateReport() {
            const topic = document.getElementById("topic").value
            document.getElementById("status").innerText = "Researching..... this may take some time"

            const response = await fetch(`/research?topic=${topic}`,{
                method: "POST"
            })

            const blob = await response.blob()
            const url  = window.URL.createObjectURL(blob)
            const a = document.createElement("a")

            a.href = url
            a.download = "report.pdf"
            a.click()
            
            document.getElementById("status").innerText = "Report Downloaded"

        }
            
        
    </script>
</body>
</html>
